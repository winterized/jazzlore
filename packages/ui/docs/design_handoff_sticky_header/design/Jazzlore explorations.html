<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jazzlore — sticky header explorations</title>
  <link rel="stylesheet" href="app/jazzlore.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    /* Tiny artboard chrome shadow */
    [data-dc-slot] .dc-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04); border-radius: 6px; overflow: hidden; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="app/data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/variations.jsx"></script>
  <script type="text/babel" src="app/jazz-app.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DESK_W = 1080;
    const DESK_H = 700;
    const MOB_W = 380;
    const MOB_H = 700;

    function Variant({ v }) {
      return (
        <DCSection
          id={v.id}
          title={`${v.id} · ${v.name}`}
          subtitle={v.desc}
        >
          <DCArtboard id={`${v.id}-chords-desktop`} label="Chords · Desktop · Dark" width={DESK_W} height={DESK_H}>
            <JazzApp variation={v.id} app="chords" device="desktop" initialTheme="dark" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-chords-desktop-light`} label="Chords · Desktop · Light" width={DESK_W} height={DESK_H}>
            <JazzApp variation={v.id} app="chords" device="desktop" initialTheme="light" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-scales-desktop`} label="Scales · Desktop · Dark" width={DESK_W} height={DESK_H}>
            <JazzApp variation={v.id} app="scales" device="desktop" initialTheme="dark" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-scales-desktop-light`} label="Scales · Desktop · Light" width={DESK_W} height={DESK_H}>
            <JazzApp variation={v.id} app="scales" device="desktop" initialTheme="light" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-chords-mobile`} label="Chords · Mobile · Dark" width={MOB_W} height={MOB_H}>
            <JazzApp variation={v.id} app="chords" device="mobile" initialTheme="dark" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-chords-mobile-light`} label="Chords · Mobile · Light" width={MOB_W} height={MOB_H}>
            <JazzApp variation={v.id} app="chords" device="mobile" initialTheme="light" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-scales-mobile`} label="Scales · Mobile · Dark" width={MOB_W} height={MOB_H}>
            <JazzApp variation={v.id} app="scales" device="mobile" initialTheme="dark" />
          </DCArtboard>
          <DCArtboard id={`${v.id}-scales-mobile-light`} label="Scales · Mobile · Light" width={MOB_W} height={MOB_H}>
            <JazzApp variation={v.id} app="scales" device="mobile" initialTheme="light" />
          </DCArtboard>
        </DCSection>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          {window.VARIATION_META.map((v) => <Variant key={v.id} v={v} />)}
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
