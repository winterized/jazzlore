<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jazzlore — V2 sticky header</title>
  <link rel="stylesheet" href="app/jazzlore.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a1a; color: #e5e5e5; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    /* Hero header — project context */
    .hero-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding: 8px 4px 22px;
      flex-wrap: wrap;
    }
    .hero-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0;
      color: #fafafa;
    }
    .hero-kicker {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #888;
      margin-bottom: 6px;
    }
    .hero-sub {
      margin: 6px 0 0;
      font-size: 13px;
      color: #999;
      max-width: 520px;
      line-height: 1.5;
    }

    /* Switcher chrome */
    .switcher {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .seg {
      display: inline-flex;
      gap: 0;
      background: #232323;
      border: 1px solid #303030;
      border-radius: 8px;
      padding: 3px;
    }
    .seg button {
      background: transparent;
      border: 0;
      color: #b5b5b5;
      font: 500 12px/1 inherit;
      padding: 7px 14px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .seg button[aria-pressed="true"] {
      background: #3a3a3a;
      color: #fff;
    }
    .seg button:hover:not([aria-pressed="true"]) { color: #fff; }

    /* Frame containing the live V2 prototype */
    .stage {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 50px -20px rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0;
      min-height: 720px;
    }
    .stage[data-device="desktop"] .frame {
      width: 100%;
      height: 720px;
    }
    .stage[data-device="mobile"] {
      background: #161616;
      padding: 24px 0;
    }
    .stage[data-device="mobile"] .frame {
      width: 390px;
      height: 720px;
      border-radius: 26px;
      box-shadow: 0 0 0 8px #0a0a0a, 0 12px 30px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Section divider */
    .section {
      margin-top: 56px;
    }
    .section h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 4px 6px;
      color: #fafafa;
    }
    .section .sub {
      margin: 0 4px 18px;
      font-size: 13px;
      color: #888;
      max-width: 640px;
      line-height: 1.5;
    }

    /* Sub-variation grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      overflow: hidden;
    }
    .card-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #232323;
    }
    .card-id {
      display: inline-block;
      font: 600 10px/1 ui-monospace, monospace;
      letter-spacing: 0.1em;
      color: #888;
      background: #1f1f1f;
      border: 1px solid #2a2a2a;
      padding: 4px 7px;
      border-radius: 4px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #fafafa;
      margin: 0 0 4px;
    }
    .card-desc {
      font-size: 12px;
      color: #888;
      margin: 0;
      line-height: 1.5;
    }
    .card-stage {
      height: 560px;
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
    }
    .card-stage[data-device="mobile"] {
      background: #161616;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 0;
      height: 600px;
    }
    .card-stage[data-device="mobile"] .frame {
      width: 360px;
      height: 100%;
      border-radius: 20px;
      box-shadow: 0 0 0 6px #0a0a0a;
      overflow: hidden;
    }
    .card-stage .frame { width: 100%; height: 100%; }

    /* Footnote link */
    .footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid #232323;
      color: #888;
      font-size: 12px;
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .footer a {
      color: #d4d4d4;
      text-decoration: none;
      border-bottom: 1px solid #444;
      padding-bottom: 1px;
    }
    .footer a:hover { color: #fff; border-color: #888; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="app/data.js"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/variations.jsx"></script>
  <script type="text/babel" src="app/jazz-app.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function Seg({ value, onChange, options }) {
      return (
        <div className="seg">
          {options.map((o) => (
            <button
              key={o.value}
              aria-pressed={value === o.value}
              onClick={() => onChange(o.value)}
            >{o.label}</button>
          ))}
        </div>
      );
    }

    const SUB_VARIATIONS = [
      {
        id: "V2a",
        title: "Plain · no labels, solid bg",
        desc: "Baseline V2 — clean chip row without category labels and a solid header background. Reference point.",
        variation: "V2",
        chordGroupHeaders: true,
        headerStyle: "solid",
      },
      {
        id: "V2b",
        title: "Grouped chip labels only",
        desc: "Adds uppercase category labels (Triads · Sevenths · Extended…) with subtle dividers between groups in the chip row.",
        variation: "V2g",
        chordGroupHeaders: true,
        headerStyle: "solid",
      },
      {
        id: "V2c",
        title: "Translucent header only",
        desc: "Backdrop-blur on the sticky bar so card content reads softly through it. Chip row stays plain.",
        variation: "V2",
        chordGroupHeaders: true,
        headerStyle: "translucent",
      },
      {
        id: "V2bc",
        title: "Selected · grouped + translucent",
        desc: "The combination locked in for the headline above — grouped chip labels on a translucent backdrop-blur header.",
        variation: "V2g",
        chordGroupHeaders: true,
        headerStyle: "translucent",
      },
    ];

    function App() {
      const [app, setApp] = useState("chords");
      const [theme, setTheme] = useState("dark");
      const [device, setDevice] = useState("desktop");

      return (
        <div className="page">
          <header className="hero-head">
            <div>
              <span className="hero-kicker">scales.jazzlore.com · chords.jazzlore.com</span>
              <h1 className="hero-title">Sticky header — V2 selected</h1>
              <p className="hero-sub">Inline root picker on row one, scroll-spy chip row beneath with category labels (Triads · Sevenths · Extended…), translucent backdrop-blur header. Scroll inside the prototype to feel the sticky behaviour and the title-shrink. Mobile collapses the root picker into a "C&nbsp;▾" pill that opens a bottom sheet.</p>
            </div>
            <div className="switcher">
              <Seg value={app} onChange={setApp} options={[
                { value: "chords", label: "Chords" },
                { value: "scales", label: "Scales" },
              ]} />
              <Seg value={device} onChange={setDevice} options={[
                { value: "desktop", label: "Desktop" },
                { value: "mobile", label: "Mobile" },
              ]} />
              <Seg value={theme} onChange={setTheme} options={[
                { value: "dark", label: "Dark" },
                { value: "light", label: "Light" },
              ]} />
            </div>
          </header>

          <div className="stage" data-device={device}>
            <div className="frame">
              <JazzApp
                key={`hero-${app}-${device}-${theme}`}
                variation="V2g"
                app={app}
                device={device}
                initialTheme={theme}
                chordGroupHeaders={true}
                headerStyle="translucent"
                autoScroll={false}
              />
            </div>
          </div>

          <div className="section">
            <h2>The ingredients side-by-side</h2>
            <p className="sub">The selected design (V2bc) is grouped chip labels on a translucent header. These four cards show each ingredient on its own so you can compare. The switcher above drives all of them — change app, device, or theme to see how each holds up.</p>

            <div className="grid">
              {SUB_VARIATIONS.map((sv) => (
                <div className="card" key={sv.id}>
                  <div className="card-head">
                    <span className="card-id">{sv.id}</span>
                    <h3 className="card-title">{sv.title}</h3>
                    <p className="card-desc">{sv.desc}</p>
                  </div>
                  <div className="card-stage" data-device={device}>
                    <div className="frame">
                      <JazzApp
                        key={`${sv.id}-${app}-${device}-${theme}`}
                        variation={sv.variation}
                        app={app}
                        device={device}
                        initialTheme={theme}
                        chordGroupHeaders={sv.chordGroupHeaders}
                        headerStyle={sv.headerStyle}
                        autoScroll={true}
                      />
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <footer className="footer">
            <span>Five-variation overview kept at <a href="Jazzlore explorations.html">Jazzlore explorations.html</a>.</span>
            <span>Use the switcher above to drive every prototype on this page.</span>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
