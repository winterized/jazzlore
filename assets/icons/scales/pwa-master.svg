<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Scales PWA master.
       Empty 5-line staff in amber spanning the full icon width, drawn
       BEHIND the strings-blue brand dot. Per user direction: simple, big,
       behind. Lines visible on the left/right flanks of the dot. -->
  <rect width="512" height="512" rx="72" fill="#0a0a0a"/>

  <!-- 5-line staff (amber), centered vertically around the dot, span -->
  <g stroke="#f4a233" stroke-width="10" stroke-linecap="butt">
    <line x1="0" y1="176" x2="512" y2="176"/>
    <line x1="0" y1="216" x2="512" y2="216"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="296" x2="512" y2="296"/>
    <line x1="0" y1="336" x2="512" y2="336"/>
  </g>

  <!-- Brand dot (strings blue) drawn over the staff -->
  <circle cx="256" cy="256" r="112" fill="#6f8caa"/>
</svg>
