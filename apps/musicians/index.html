<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Tap through jazz musicians to discover who they played with, hear what defined them, and find new artists worth listening to on Spotify and Apple Music." />
    <!-- The detail-hero portrait (the detail-route LCP image, issue #164) is
         hotlinked from Wikimedia Commons. It can't be preloaded (SPA — the URL
         is only known after the BFF resolves), so warm the TLS connection
         early. No `crossorigin`: the portrait <img> loads anonymously (no
         crossOrigin attr), so a crossorigin preconnect would open a second,
         unused socket. -->
    <link rel="preconnect" href="https://upload.wikimedia.org" />
    <!-- Preload only the above-the-fold woff2 (Phase-G perf pass): Geist 400
         (body/UI base), Geist 600 (headings/labels), Newsreader 500 (the
         serif hero h1 — LCP text). The remaining 8 weights stay lazy under
         font-display:swap with their metrics-matched fallbacks (CLS≈0).

         Audit HIGH-7 (2026-05-21) flagged "preloaded but not used" warnings
         for these 3 woff2s; Wave-1 PR3b re-verified the strategy and added
         a live regression guard so future drift fails fast. See
         tests/e2e/musicians-joint-fix-acceptance.spec.ts → "Wave 1 / PR3b —
         font preload regression guard (HIGH-7)". -->
    <link rel="preload" href="/fonts/geist-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/geist-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/newsreader-500.woff2" as="font" type="font/woff2" crossorigin />
    <title>Jazzlore — Jazz musicians</title>

    <!-- PWA manifest — "Add to Home Screen" yields a proper standalone context.
         The static public/manifest.webmanifest is the canonical source (vite-plugin-pwa
         is configured with manifest:false and leaves it untouched). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Apple-specific meta + touch icon. iOS uses these (not the manifest)
         for the home-screen + status-bar treatment. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Musicians" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
