<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="A web-based metronome built for practicing with an electronic piano — keeps every click audible on iPhone over USB-C → RCA where most native iOS metronomes drop beats. Tempo 30–240 BPM, time signatures 2–7, accent patterns, jazz-feel backbeat, bar-on/bar-off." />
    <title>Jazzlore — Metronome</title>

    <!-- PWA manifest — "Add to Home Screen" yields a proper standalone
         context where Wake Lock API + NoSleep.js both work reliably (vs.
         in-app webviews where both silently fail). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Apple-specific meta + touch icon. iOS uses these (not the
         manifest) for the home-screen + status-bar treatment. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Metronome" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
