<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Jazzlore — the gate</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&family=Newsreader:ital,wght@0,400;1,400&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#1c1917"/>
    <rect x="0" y="0" width="200" height="3" fill="#fbbf24"/>
    <g fill="#fbbf24">
      <circle cx="60" cy="80" r="6"/><circle cx="100" cy="70" r="4"/>
      <circle cx="140" cy="92" r="5"/><circle cx="80" cy="110" r="3"/>
      <circle cx="120" cy="116" r="4"/>
    </g>
    <g stroke="#fbbf24" stroke-width="0.8" opacity="0.55">
      <line x1="60" y1="80" x2="100" y2="70"/>
      <line x1="100" y1="70" x2="140" y2="92"/>
      <line x1="60" y1="80" x2="80" y2="110"/>
      <line x1="140" y1="92" x2="120" y2="116"/>
      <line x1="80" y1="110" x2="120" y2="116"/>
    </g>
    <text x="100" y="160" text-anchor="middle"
      font-family="Georgia, serif" font-size="22" fill="#faf8f4">jazzlore</text>
    <text x="100" y="178" text-anchor="middle"
      font-family="ui-monospace, Menlo, monospace" font-size="7"
      letter-spacing="2" fill="#a8a29e">THE  GATE</text>
  </svg>
</template>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="gate-launcher.jsx"></script>

<script type="text/babel" data-presets="react">
  const {
    LauncherDesktop: _LD, LauncherMobile: _LM,
  } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="launcher"
          title="Launcher"
          subtitle="Tiles as live app widgets — each previews a slice of the actual app interface.">
          <DCArtboard id="b-desk-light" label="Desktop · Light" width={1280} height={800}>
            <_LD dark={false} />
          </DCArtboard>
          <DCArtboard id="b-desk-dark" label="Desktop · Dark" width={1280} height={800}>
            <_LD dark={true} />
          </DCArtboard>
          <DCArtboard id="b-mob-light" label="Mobile · Light" width={390} height={844}>
            <_LM dark={false} />
          </DCArtboard>
          <DCArtboard id="b-mob-dark" label="Mobile · Dark" width={390} height={844}>
            <_LM dark={true} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
